<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/app_mobile.css">
        <style>
            .input-container {
                position: relative;
                width: 100%;
                max-width: 450px;
                margin-bottom: 10px;
                display: flex;
                align-items: center;
            }
            .input-field {
                background-color: white;
                border: 1px solid #ccc;
                padding: 8px;
                border-radius: 4px;
                flex-grow: 1;
                color: black;
                width: 100%;
            }
            .control-buttons {
                display: flex;
                gap: 10px;
                margin-bottom: 10px;
            }
            .result-card {
                background-color: #2d2d2d;
                color: white;
                height: auto;
                width: 300px;
                display: flex;
                flex-direction: column;
                margin-bottom: 1rem;
                padding: 1rem;
                border-radius: 0.5rem;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                word-wrap: break-word;
                justify-content: space-between;
                position: relative;
                text-align: center;
            }
            .result-card img {
                width: 115px;
                height: 115px;
                align-self: center;
            }
            .result-card h2 {
                font-size: 1.25rem;
                font-weight: bold;
                margin-bottom: 1rem;
            }
            .result-card p {
                font-size: 1rem;
                margin-bottom: 0.5rem;
            }
            .fixed-header {
                position: fixed;
                top: 0;
                width: 100%;
                background-color: #1a202c;
                padding: 1rem 0;
                z-index: 1000;
                display: flex;
                flex-direction: column;
                align-items: center;
                height: auto;
                padding-top: 2rem;
                padding-bottom: 2rem;
            }
            .watermark-fixed {
                position: absolute;
                top: 10px;
                left: 10px;
                font-size: 0.75rem;
                color: #a0aec0;
            }
            .progress-bar-container {
                width: 100%;
                max-width: 450px;
                margin-top: 10px;
                height: 20px;
            }
            
            .suggestions {
                position: absolute;
                top: 100%;
                left: 0;
                background-color: white;
                border: 1px solid #ccc;
                width: 100%;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                z-index: 1000;
                display: none; /* hidden by default */
                color: black;
            }
            .suggestions li {
                padding: 8px;
                cursor: pointer;
                border-bottom: 1px solid #eee;
            }
            .suggestions li:last-child {
                border-bottom: none;
            }
            .suggestions li.highlighted,
            .suggestions li:hover {
                background-color: #BFC2BA;
            }

            #results {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                align-items: flex-start;
                gap: 20px;
                padding: 1rem;
                margin-top: 250px; /* height of fixed-header (approx) + some spacing */
                width: 100%;
            }


            html, body {
                min-height: 100%;
                background-color: #111827 !important;
            }
            body {
                padding-top: 215px;
                justify-content: flex-start !important;
                background-color: #111827 !important;
            }
            .fixed-header {
                background-color: #111827;
                padding-bottom: 1rem;
            }
            #results {
                display: block;
                margin-top: 0;
                padding: 0.75rem 1rem 4rem;
                width: 100%;
                min-height: calc(100vh - 215px);
                overflow-x: hidden;
                background-color: #111827;
            }
            .evolution-tree {
                display: flex;
                justify-content: center;
                width: 100%;
                margin: 0 auto;
                padding: 0.25rem 1rem 1rem;
            }
            .evo-node {
                display: flex;
                flex-direction: column;
                align-items: center;
                position: relative;
                width: 100%;
            }
            .evo-node > .result-card {
                flex: 0 0 auto;
            }
            .evo-branch {
                position: relative;
                width: 100%;
                max-width: 1240px;
                padding-top: 28px;
                margin-top: 8px;
            }
            .evo-branch::before {
                content: "";
                position: absolute;
                top: 0;
                left: 50%;
                width: 2px;
                height: 28px;
                transform: translateX(-50%);
                background: #4b5563;
            }
            .evo-children {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(260px, 300px));
                justify-content: center;
                justify-items: center;
                align-items: flex-start;
                gap: 1.25rem 1.5rem;
                width: 100%;
                position: relative;
                padding-top: 20px;
            }
            .evo-children::before {
                content: "";
                position: absolute;
                top: 0;
                left: max(20px, calc(50% - 420px));
                right: max(20px, calc(50% - 420px));
                height: 2px;
                background: #4b5563;
            }
            .evo-children.single::before {
                display: none;
            }
            .evo-children.single {
                padding-top: 0;
            }
            .evo-children.compact {
                grid-template-columns: repeat(var(--child-count), minmax(260px, 300px));
                max-width: calc(var(--child-count) * 300px + (var(--child-count) - 1) * 1.5rem);
                margin-left: auto;
                margin-right: auto;
            }
            .evo-children.wide {
                grid-template-columns: repeat(auto-fit, minmax(250px, 300px));
                max-width: min(100%, 1240px);
            }
            .evo-child {
                position: relative;
                width: 100%;
                max-width: 300px;
            }
            .evo-child::before {
                content: "";
                position: absolute;
                top: -20px;
                left: 50%;
                width: 2px;
                height: 20px;
                transform: translateX(-50%);
                background: #4b5563;
            }
            .evo-children.single .evo-child::before {
                top: -28px;
                height: 28px;
            }
            .result-card {
                min-height: 220px;
                background-color: #2d2d2d;
                justify-content: flex-start;
            }
            .result-card img {
                margin-top: 0.25rem;
                margin-bottom: 0.35rem;
            }
            .evo-root-spacer {
                display: none;
            }
            .evo-condition-list {
                margin-top: 0.35rem;
                display: flex;
                flex-direction: column;
                gap: 0.3rem;
            }
            .evo-condition-row {
                margin: 0 !important;
                line-height: 1.35;
            }
            .sprite-missing-label {
            color: #d1d5db;
            font-size: 0.9rem;
            margin: 0.35rem 0 1rem;
        }

        .evo-note {
                margin-top: 0.5rem;
                color: #cbd5e1;
            }


            /* Radial layout for many same-stage evolutions, e.g. Eevee. */
            .evolution-tree.radial-mode {
                display: block;
                width: 100%;
                padding: 0.75rem 0 3rem;
                overflow: visible;
            }
            .evo-radial {
                --radial-size: 940px;
                --radial-radius: 350px;
                position: relative;
                width: min(100%, var(--radial-size));
                height: var(--radial-size);
                margin: 0 auto;
            }
            .evo-radial-lines {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 1;
                overflow: visible;
            }
            .evo-radial-line {
                stroke: #4b5563;
                stroke-width: 2;
                stroke-linecap: round;
                opacity: 0.9;
            }
            .evo-radial-center,
            .evo-radial-child {
                position: absolute;
                left: 50%;
                top: 50%;
                z-index: 2;
            }
            .evo-radial-center {
                transform: translate(-50%, -50%);
            }
            .evo-radial-child {
                transform:
                    translate(-50%, -50%)
                    rotate(var(--angle))
                    translate(var(--radial-radius))
                    rotate(calc(-1 * var(--angle)));
            }
            .evo-radial .result-card {
                width: 245px;
                min-height: 205px;
                padding: 0.85rem;
                margin-bottom: 0;
            }
            .evo-radial.many .result-card {
                width: 220px;
                min-height: 190px;
                padding: 0.75rem;
            }
            .evo-radial .result-card h2 {
                font-size: 1.05rem;
                margin-bottom: 0.55rem;
            }
            .evo-radial .result-card img {
                width: 82px;
                height: 82px;
                margin-top: 0;
                margin-bottom: 0.25rem;
            }
            .evo-radial .result-card p,
            .evo-radial .evo-condition-row {
                font-size: 0.82rem;
                line-height: 1.25;
            }
            .evo-radial-center .result-card {
                width: 245px;
                min-height: 185px;
            }
            .evo-layout-note {
                color: #cbd5e1;
                font-size: 0.85rem;
                text-align: center;
                margin: 0.5rem auto 0;
                max-width: 620px;
            }

            @media (max-width: 900px) {
                body { padding-top: 235px; }
                #results { min-height: calc(100vh - 235px); }
                .evolution-tree { padding-left: 0; padding-right: 0; }
                .evo-branch { max-width: 100%; }
                .evo-children,
                .evo-children.compact,
                .evo-children.wide {
                    grid-template-columns: repeat(auto-fit, minmax(240px, 300px));
                    gap: 1rem;
                }

                .evolution-tree.radial-mode {
                    padding-top: 0.25rem;
                }
                .evo-radial {
                    height: auto !important;
                    width: 100%;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    gap: 1rem;
                    margin-top: 0;
                }
                .evo-radial-lines {
                    display: none;
                }
                .evo-radial-center,
                .evo-radial-child {
                    position: static;
                    transform: none !important;
                }
                .evo-radial .result-card,
                .evo-radial.many .result-card,
                .evo-radial-center .result-card {
                    width: min(300px, calc(100vw - 2rem));
                    min-height: 190px;
                }

                .evo-children::before {
                    left: 30px;
                    right: 30px;
                }
            }

        </style>
        <title>Pokémon Evolution Search</title>
    </head>
    <body
        class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen w-full"
    >
        <div class="fixed-header">
            <div class="watermark-fixed">Created by BorderM</div>
            <h1 class="text-3xl font-bold text-center mb-2">
                Pokémon Evolutions
            </h1>
            <div class="control-buttons flex flex-wrap justify-center gap-2">
                <button id="search-btn"
                    class="bg-blue-500 text-white p-2 rounded-lg"
                >
                    Search
                </button>
                <button id="clear-btn"
                    class="bg-gray-500 text-white p-2 rounded-lg"
                >
                    Clear
                </button>
                <a href="/pokedex" class="bg-purple-500 text-white p-2 rounded-lg">Pokédex</a>
                <a
                    href="/typeeffectiveness"
                    class="bg-green-500 text-white p-2 rounded-lg"
                    >Type Effectiveness</a
                >
                <a href="/stats" class="bg-yellow-500 text-white p-2 rounded-lg"
                    >Stats</a
                >
                <a
                    href="/typecalculator"
                    class="bg-red-500 text-white p-2 rounded-lg"
                    >Type Calcs</a
                >
                <a href="/natures" class="bg-cyan-500 text-white p-2 rounded-lg"
                    >Natures</a
                >
            </div>
            <div class="input-container">
                <input type="text" class="input-field" id="pokemon-search" placeholder="Enter Pokémon Name" autocomplete="off" />
                <ul class="suggestions" id="suggestions"></ul>
            </div>
            <div
                id="progress-bar-container"
                class="progress-bar-container hidden"
            >
                <div class="progress-bar"></div>
            </div>
            <div id="error-message" class="error-message-fixed"></div>
        </div>
        <div id="results"></div>
        <script id="formsByBase"   type="application/json">{{ forms_by_base_json|tojson }}</script>
        <script id="formCollapseMap" type="application/json">{{ collapse_map|tojson }}</script>
        <script id="processedCache" type="application/json">{{ processed_cache_json|safe }}</script>
        <script id="evolutionsData" type="application/json">{{ evolutions_json|safe }}</script>

        <script>
            // Static JSON data
            const FORM_COLLAPSE_MAP = JSON.parse(document.getElementById('formCollapseMap').textContent);
            const FORMS_BY_BASE = JSON.parse(document.getElementById('formsByBase').textContent);
            const EVOLUTIONS = JSON.parse(document.getElementById('evolutionsData').textContent);

            // Build evolutions lookup by form key
            const EVOLUTIONS_BY_FROM = {};
            EVOLUTIONS.forEach(e => {
            EVOLUTIONS_BY_FROM[e.from] = EVOLUTIONS_BY_FROM[e.from] || [];
            EVOLUTIONS_BY_FROM[e.from].push(e);
            });

            // Override map for niche cases
            const FORM_OVERRIDES = {
            basculin: 'basculin-white-striped',
            basculegion: 'basculegion-male',
            pumpkaboo: 'pumpkaboo-average',
            gourgeist: 'gourgeist-average',
            aegislash: 'aegislash-shield', 
            wormadam: 'wormadam-plant',
            // add more manual overrides here
            };

            // Words indicating form suffixes to collapse
            const SHORTEN_SECOND = new Set([
                "average", "three", "two", "standard", "ordinary", "family",
                "disguised", "busted", "plant", "sandy", "trash", "blade",
                "shield", "midday", "midnight", "dusk", "school", "small",
                "large", "super", "white"
            ]);

            const PRESERVE = new Set([
                "charizard-mega-x", "charizard-mega-y", "mewtwo-mega-x", "mewtwo-mega-y",
                "slowpoke-galar", "farfetchd-galar", "mime-jr", "mr-mime", "mr-rime",
                "pumpkaboo", "gourgeist", "toxtricity-amped", "toxtricity-low-key"
            ]);

            const FULL_NAMES = new Set([
                "mr-mime", "mr-mime-galar", "mr-rime", "mime-jr",
                "type-null", "tapu-koko", "tapu-lele", "tapu-bulu", "tapu-fini",
                "pumpkaboo-average", "gourgeist-average", "basculin-white-striped",
                "wormadam-plant", "aegislash-shield" 
            ]);

            const REGIONAL_SUFFIXES = ['alola', 'alolan', 'galar', 'galarian', 'hisui', 'hisuian', 'paldea', 'paldean'];

            function collapseKey(raw) {
                const key = raw.toLowerCase().trim();

                // Fully preserve specific multi-word names
                const FULL_NAMES = new Set([
                    "mr-mime", "mr-mime-galar", "mr-rime", "mime-jr",
                    "type-null", "tapu-koko", "tapu-lele", "tapu-bulu", "tapu-fini"
                ]);
                if (FULL_NAMES.has(key)) return key;

                // Preserve regional forms
                if (REGIONAL_SUFFIXES.some(suffix => key.endsWith('-' + suffix))) {
                    return key;
                }

                if (PRESERVE.has(key)) return key;

                const parts = key.split('-');
                const base = parts[0];

                if (FORM_COLLAPSE_MAP[key]) return FORM_COLLAPSE_MAP[key][0];

                const sibs = FORMS_BY_BASE[base] || [base];
                const signatures = new Set(
                    sibs.map(f =>
                        JSON.stringify((EVOLUTIONS_BY_FROM[f] || []).map(e => [e.to, e.trigger]).sort())
                    )
                );

                return signatures.size > 1 ? key : base;
            }

            function formatDisplayName(raw) {
                if (typeof raw !== 'string') return raw;

                const key = raw.toLowerCase();

                const FULL_NAMES = new Set([
                    "mr-mime", "mr-mime-galar", "mr-rime", "mime-jr",
                    "type-null", "tapu-koko", "tapu-lele", "tapu-bulu", "tapu-fini",
                    "pumpkaboo-average", "gourgeist-average", "basculin-white-striped",
                    "wormadam-plant", "aegislash-shield"
                ]);

                const HIDE_FORM_SUFFIX = new Set([
                    "pumpkaboo-average", "gourgeist-average", "basculin-white-striped", "wormadam-plant", "aegislash-shield"
                ]);

                if (FULL_NAMES.has(key)) {
                    if (key.startsWith('wormadam')) return 'Wormadam';
                    if (key.startsWith('aegislash')) return 'Aegislash';
                    return key.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                }

                if (HIDE_FORM_SUFFIX.has(key)) {
                    return key.split('-')[0].replace(/\b\w/g, c => c.toUpperCase());
                }

                const parts = key.split('-');
                const base = parts[0].charAt(0).toUpperCase() + parts[0].slice(1);
                const suffix = parts.slice(1).map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' ');
                return suffix ? `${base} ${suffix}` : base;
            }

            // Debounce
            function debounce(fn, ms) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => fn.apply(this, args), ms);
            };
            }

            // DOM refs
            const inputEl = document.getElementById('pokemon-search');
            const suggestionsBox = document.getElementById('suggestions');
            const resultsContainer = document.getElementById('results');

            function showSuggestions() { suggestionsBox.style.display = 'block'; }
            function hideSuggestions() { suggestionsBox.style.display = 'none'; selectedIndex = -1; }

            function selectSuggestion(idx) {
            if (idx < 0 || idx >= collapsedItems.length) return;
            const { display, key } = collapsedItems[idx];
            inputEl.value = display;
            hideSuggestions();
            fetchEvolutions(key);
            // 📦 Save state
            localStorage.setItem('evoLastKey', key);
            localStorage.setItem('evoLastDisplay', display);;
            }

            function pickRepresentative(canon) {
                // 1) Use override if exists
                if (FORM_OVERRIDES[canon]) {
                    return FORM_OVERRIDES[canon];
                }

                // 2) Try form that has evolutions
                const forms = FORMS_BY_BASE[canon] || [canon];
                const evoForm = forms.find(f => EVOLUTIONS_BY_FROM[f]?.length);
                if (evoForm) return evoForm;

                // 3) Try base key directly
                if (EVOLUTIONS_BY_FROM[canon]?.length) {
                    return canon;
                }

                // 4) Default fallback
                return forms[0];
            }

            let collapsedItems = [];
            let selectedIndex  = -1;

            // when the user types
            function handleInput(e) {
                const q = e.target.value.toLowerCase().trim();
                if (q.length < 2) {
                    hideSuggestions();
                    return;
                }
                fetchSuggestions(q);
            }

            async function fetchSuggestions(query) {
                const res = await fetch(
                    `/api/pokemon/suggestions?query=${encodeURIComponent(query)}`
                );
                const { suggestions: raw } = await res.json();
                if (!raw.length) {
                    hideSuggestions();
                    return;
                }

                // 1) extract and dedupe the raw keys
                let keys = Array.from(new Set(raw.map(s => s.key)));

                // 2) remove any purely cosmetic Dynamax/G-Max
                keys = keys.filter(k => {
                    const l = k.toLowerCase();
                    return !l.endsWith('-gmax') && !l.endsWith('-gigantamax');
                });

                // 3) bucket by your collapseKey so mechanical-duplicates collapse
                const buckets = {};
                keys.forEach(k => {
                    const canon = collapseKey(k);
                    (buckets[canon] ||= new Set()).add(k);
                });

                // 4) pick a representative from each bucket
                const items = Object.keys(buckets)
                    .sort((a, b) => formatDisplayName(a).localeCompare(formatDisplayName(b)))
                    .map(canon => {
                        const forms = Array.from(buckets[canon]);
                        const pick = pickRepresentative(canon);

                        const display = formatDisplayName(canon);

                        return {
                            display,
                            key: pick
                        };
                    });

                // 5) render them
                collapsedItems = items;
                suggestionsBox.innerHTML = '';
                items.forEach((it, i) => {
                    const li = document.createElement('li');
                    li.textContent   = it.display;
                    li.dataset.idx   = i;
                    if (i === 0) li.classList.add('highlighted');
                    li.addEventListener('click', () => selectSuggestion(i));
                    suggestionsBox.appendChild(li);
                });

                selectedIndex = 0;
                showSuggestions();
            }

            function handleArrows(e) {
                const items = Array.from(suggestionsBox.children);
                if (!items.length) {
                    if (e.key==='Enter') fetchEvolutions();
                    return;
                }
                if (e.key==='ArrowDown')  selectedIndex = (selectedIndex+1)%items.length;
                if (e.key==='ArrowUp')    selectedIndex = (selectedIndex-1+items.length)%items.length;
                if (e.key==='Enter') {
                    e.preventDefault();
                    selectSuggestion(selectedIndex);
                    return;
                }
                items.forEach((li,i)=> li.classList.toggle('highlighted', i===selectedIndex));
            }

            function fetchEvolutions(nameKey) {
            const name = nameKey || collapseKey(inputEl.value.trim());
            hideSuggestions();
            inputEl.value = '';
            resultsContainer.innerHTML = '';
            fetch(`/api/pokemon/evolutions?name=${encodeURIComponent(name)}`)
                .then(r=>r.json()).then(renderResults);
            }

            function capitalizeFirstLetter(str) {
                return str.replace(/^(\w)/, (m,p) => p.toUpperCase());
            }

            function renderResults(data) {
                const container = document.getElementById('results');
                container.innerHTML = '';

                if (!Array.isArray(data) || data.length === 0) {
                    container.innerHTML = '<div class="result-card"><p>No evolution data found.</p></div>';
                    return;
                }

                const byName = new Map(data.map(p => [p.name, p]));
                const childrenByParent = new Map();
                data.forEach(p => {
                    if (!p.parent_key || !byName.has(p.parent_key)) return;
                    if (!childrenByParent.has(p.parent_key)) childrenByParent.set(p.parent_key, []);
                    childrenByParent.get(p.parent_key).push(p);
                });

                const roots = data.filter(p => !p.parent_key || !byName.has(p.parent_key));
                const tree = document.createElement('div');
                tree.className = 'evolution-tree';

                if (roots.length === 1 && shouldUseRadialLayout(roots[0], childrenByParent)) {
                    tree.classList.add('radial-mode');
                    tree.appendChild(renderRadialEvolution(roots[0], childrenByParent));
                } else {
                    roots.forEach(root => tree.appendChild(renderEvolutionNode(root, childrenByParent, false)));
                }
                container.appendChild(tree);
            }

            function shouldUseRadialLayout(root, childrenByParent) {
                const children = childrenByParent.get(root.name) || [];
                if (children.length < 4) return false;
                // A radial layout is only used for a hub with many direct, same-stage leaves.
                // Multi-step branches like Applin -> Dipplin -> Hydrapple should stay as a tree.
                return children.every(child => !(childrenByParent.get(child.name) || []).length);
            }

            function renderRadialEvolution(root, childrenByParent) {
                const children = [...(childrenByParent.get(root.name) || [])]
                    .sort((a, b) => titleForPokemon(a).localeCompare(titleForPokemon(b)));
                const count = children.length;

                const radial = document.createElement('div');
                radial.className = `evo-radial ${count >= 7 ? 'many' : count >= 5 ? 'several' : 'few'}`;

                const radius = Math.min(420, Math.max(285, 230 + count * 20));
                const size = Math.max(720, radius * 2 + (count >= 7 ? 280 : 320));
                radial.style.setProperty('--radial-size', `${size}px`);
                radial.style.setProperty('--radial-radius', `${radius}px`);

                const center = size / 2;
                const lineEndOffset = count >= 7 ? 110 : 125;
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('class', 'evo-radial-lines');
                svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
                svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

                const centerWrap = document.createElement('div');
                centerWrap.className = 'evo-radial-center';
                centerWrap.appendChild(createEvolutionCard(root));
                radial.appendChild(centerWrap);

                children.forEach((child, i) => {
                    const angle = -90 + (360 / count) * i;
                    const radians = angle * Math.PI / 180;
                    const x1 = center + Math.cos(radians) * 120;
                    const y1 = center + Math.sin(radians) * 95;
                    const x2 = center + Math.cos(radians) * (radius - lineEndOffset);
                    const y2 = center + Math.sin(radians) * (radius - lineEndOffset);
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('class', 'evo-radial-line');
                    line.setAttribute('x1', x1.toFixed(1));
                    line.setAttribute('y1', y1.toFixed(1));
                    line.setAttribute('x2', x2.toFixed(1));
                    line.setAttribute('y2', y2.toFixed(1));
                    svg.appendChild(line);

                    const childWrap = document.createElement('div');
                    childWrap.className = 'evo-radial-child';
                    childWrap.style.setProperty('--angle', `${angle}deg`);
                    childWrap.appendChild(createEvolutionCard(child));
                    radial.appendChild(childWrap);
                });

                radial.prepend(svg);
                return radial;
            }

            function titleForPokemon(p) {
                return p.display_name || formatDisplayName(p.name);
            }

            function renderEvolutionNode(p, childrenByParent, isChild) {
                const wrapper = document.createElement('div');
                wrapper.className = isChild ? 'evo-node evo-child' : 'evo-node';
                wrapper.appendChild(createEvolutionCard(p));

                const children = childrenByParent.get(p.name) || [];
                if (children.length) {
                    const branch = document.createElement('div');
                    branch.className = 'evo-branch';

                    const row = document.createElement('div');
                    const modeClass = children.length === 1 ? 'single' : children.length <= 3 ? 'compact' : 'wide';
                    row.className = `evo-children ${modeClass}`;
                    row.style.setProperty('--child-count', String(Math.max(children.length, 1)));
                    children.forEach(child => row.appendChild(renderEvolutionNode(child, childrenByParent, true)));

                    branch.appendChild(row);
                    wrapper.appendChild(branch);
                }
                return wrapper;
            }


            function escapeHtmlAttr(value) {
                return String(value || '')
                    .replace(/&/g, '&amp;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            }

            function handleEvolutionSpriteError(img) {
                let fallbacks = [];
                try {
                    fallbacks = JSON.parse(img.dataset.fallbacks || '[]');
                } catch (e) {
                    fallbacks = [];
                }

                const current = img.getAttribute('src');
                const next = fallbacks.find(src => src && src !== current && !img.dataset.tried?.split('|').includes(src));
                img.dataset.tried = `${img.dataset.tried || ''}|${current || ''}`;

                if (next) {
                    img.src = next;
                    return;
                }

                img.style.display = 'none';
                const fallbackText = document.createElement('p');
                fallbackText.className = 'sprite-missing-label';
                fallbackText.textContent = img.alt || 'Sprite unavailable';
                img.insertAdjacentElement('afterend', fallbackText);
            }

            function createEvolutionCard(p) {
                const title = titleForPokemon(p);
                const profileUrl = `/pokemon/${encodeURIComponent(p.name)}`;
                const card = document.createElement('div');
                card.className = 'result-card';

                let conditionsHtml = '';
                if (Array.isArray(p.evolution_conditions) && p.evolution_conditions.length) {
                    conditionsHtml = `<div class="evo-condition-list">${p.evolution_conditions.map(cond => {
                        return Object.entries(cond)
                            .map(([k, v]) => `<p class="evo-condition-row"><strong>${k.replace(/_/g, ' ')}:</strong> ${v}</p>`)
                            .join('');
                    }).join('<hr class="my-2">')}</div>`;
                }

                card.innerHTML = `
                    <h2>
                        <a href="${profileUrl}" class="text-blue-500 underline">
                            ${title}
                        </a>
                    </h2>
                    <img src="${p.sprite_url}" alt="${title}" data-fallbacks='${escapeHtmlAttr(JSON.stringify(p.sprite_candidates || []))}' onerror="handleEvolutionSpriteError(this)">
                    ${p.evolves_from ? `<p><strong>Evolves from:</strong> ${p.evolves_from}</p>` : '<div class="evo-root-spacer"></div>'}
                    ${conditionsHtml}
                    ${p.note ? `<p class="evo-note"><em>${p.note}</em></p>` : ''}
                `;
                return card;
            }

            function buildBulbapediaLink(name) {
                const key = String(name || '').toLowerCase();
                const pageName = formatDisplayName(key.split('-', 1)[0]).replace(/ /g, '_');
                return `https://bulbapedia.bulbagarden.net/wiki/${pageName}_(Pok%C3%A9mon)`;
            }

            inputEl.addEventListener('input', debounce(handleInput,250));
            inputEl.addEventListener('keydown', handleArrows);
            document.getElementById('search-btn').addEventListener('click', ()=> {  
                fetchEvolutions();
                // if user manually typed and hit Search without picking from dropdown,
                // you may also want to save raw collapseKey/input here:
                const raw = inputEl.value.trim().toLowerCase();
                if (raw) {
                    const canon = collapseKey(raw);
                    const fetchKey = FORM_OVERRIDES[canon] || canon;
                    localStorage.setItem('evoLastKey', fetchKey);
                    localStorage.setItem('evoLastDisplay', inputEl.value);
                }   
            });           
            document.getElementById('clear-btn').addEventListener('click', ()=>{inputEl.value='';hideSuggestions();resultsContainer.innerHTML='';
                // 🗑️ Clear saved state
                localStorage.removeItem('evoLastKey');
                localStorage.removeItem('evoLastDisplay');
            });

            // ▶️ On load, restore last search
            document.addEventListener('DOMContentLoaded', () => {
                const key     = localStorage.getItem('evoLastKey');
                const display = localStorage.getItem('evoLastDisplay');
                if (key && display) {
                    inputEl.value = display;
                    fetchEvolutions(key);
                }
            });
        </script>
    </body>
</html>
